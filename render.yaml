## Render Blueprint — Pluto
## Docs: https://render.com/docs/blueprint-spec
##
## Creates:
##   pluto-app   — Next.js web service  (port 3000)
##   pluto-ws    — Standalone WebSocket server (port auto-assigned by Render)
##   uploads     — Persistent disk mounted at public/uploads (pluto-app only)
##
## Database: Supabase (external) — set DATABASE_URL manually in the dashboard.

services:
  # ── Next.js application ─────────────────────────────────────────────────────
  - type: web
    name: pluto-app
    runtime: node
    region: singapore
    plan: starter # starter | standard | pro
    buildCommand: bash scripts/render-build.sh
    startCommand: bun run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database (Supabase) ──────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false # set to your Supabase connection string (Transaction pooler recommended)

      # ── Auth ────────────────────────────────────────────────────────────────
      - key: NEXTAUTH_URL
        sync: false # set manually in dashboard: https://your-app.onrender.com
      - key: NEXTAUTH_SECRET
        sync: false # generate: openssl rand -base64 32
      - key: AUTH_SECRET
        sync: false # same value as NEXTAUTH_SECRET

      # ── WebSocket ────────────────────────────────────────────────────────────
      # WS_INTERNAL_URL: Next.js → WS HTTP management API (server-side calls)
      # Set to https://<pluto-ws service URL> after first deploy
      - key: WS_INTERNAL_URL
        sync: false
      # WS_API_KEY must match the value set in pluto-ws
      - key: WS_API_KEY
        sync: false
      # NEXT_PUBLIC_WS_URL: browser → WS endpoint
      # Set to wss://<pluto-ws service URL>/ws after first deploy
      - key: NEXT_PUBLIC_WS_URL
        sync: false

    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 10 # increase if you expect heavy video uploads

  # ── Standalone WebSocket server ─────────────────────────────────────────────
  - type: web
    name: pluto-ws
    runtime: node
    region: singapore
    plan: starter
    buildCommand: bash scripts/render-build-ws.sh
    startCommand: NODE_ENV=production bun run server/standalone-ws.ts
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Render injects PORT automatically; standalone-ws.ts reads it first.

      # ── Database (Supabase — needed for WS auth / participant verification) ───
      - key: DATABASE_URL
        sync: false # same Supabase connection string as pluto-app

      # ── Auth (needed for JWT verification in websocket.ts) ──────────────────
      - key: AUTH_SECRET
        sync: false # same value as pluto-app AUTH_SECRET
      - key: NEXTAUTH_SECRET
        sync: false # same value
      - key: NEXTAUTH_URL
        sync: false # same value (used for CORS allow-origin)

      # ── Management API key ──────────────────────────────────────────────────
      - key: WS_API_KEY
        sync: false # same value as pluto-app WS_API_KEY

